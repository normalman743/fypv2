[tool:pytest]
# pytest 配置文件

# 测试发现配置
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 输出配置
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --cov=src
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=80

# 异步测试配置
asyncio_mode = auto

# 标记定义
markers =
    unit: Unit tests
    integration: Integration tests
    security: Security-related tests
    slow: Slow running tests
    auth: Authentication related tests
    database: Database related tests
    api: API endpoint tests

# 测试目录结构
norecursedirs = 
    .git
    .tox
    dist
    build
    *.egg
    venv
    v2env

# 最小版本要求
minversion = 7.0

# Python 路径
pythonpath = .