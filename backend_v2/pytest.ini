[pytest]
# Campus LLM System v2 - pytest 配置文件

# 测试发现配置
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 输出配置
addopts = 
    -v
    --tb=short
    --strict-markers
    --cov=src
    --cov-report=term-missing
    --cov-report=html:reports/htmlcov
    --cov-report=xml:reports/coverage.xml
    --cov-fail-under=85
    --durations=10
    --maxfail=5
    --junit-xml=reports/junit.xml

# 异步测试配置
asyncio_mode = auto

# 标记定义 - E2E测试为主的分类体系
markers =
    # === E2E 测试分类 ===
    e2e: End-to-End tests - 端到端测试
    smoke: Smoke tests - 冒烟测试，核心功能快速验证
    workflows: Workflow tests - 完整业务流程测试
    security: Security tests - 安全和权限控制测试
    edge_cases: Edge case tests - 边界条件和异常处理测试
    performance: Performance tests - 性能测试
    
    # === 功能模块分类 ===
    auth: Authentication tests - 认证功能测试
    admin: Admin functionality tests - 管理功能测试
    course: Course management tests - 课程管理测试
    storage: File storage tests - 文件存储测试
    chat: Chat functionality tests - 聊天功能测试
    ai: AI functionality tests - AI功能测试
    
    # === 技术层面分类 ===
    unit: Unit tests - 单元测试
    integration: Integration tests - 集成测试
    api: API endpoint tests - API接口测试
    database: Database related tests - 数据库测试
    model: Database model tests - 数据库模型测试
    service: Service layer tests - 服务层测试
    schema: Schema validation tests - 数据验证测试
    injection: Injection attack tests - 注入攻击测试
    error_handling: Error handling tests - 错误处理测试
    resource_limits: Resource limits tests - 资源限制测试
    concurrency: Concurrency tests - 并发测试
    rate_limiting: Rate limiting tests - 速率限制测试
    data_validation: Data validation tests - 数据验证测试
    
    # === 测试特性分类 ===
    slow: Slow running tests - 慢速测试
    fast: Fast running tests - 快速测试
    parallel: Can run in parallel - 可并行运行测试
    isolated: Requires isolation - 需要隔离运行测试

# 测试目录结构
norecursedirs = 
    .git
    .tox
    dist
    build
    *.egg
    venv
    v2env
    __pycache__
    .pytest_cache
    htmlcov
    reports

# 最小版本要求
minversion = 7.0

# Python 路径
pythonpath = .

# 测试输出选项
junit_family = xunit2
junit_suite_name = campus_llm_v2_tests

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 过滤警告
filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::pytest.PytestUnknownMarkWarning